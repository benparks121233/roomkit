version: 2

# Flat item registry — ID + required specs only.
# Budget weights live in room_presets.groups, not here.
items:
  # Bed group
  bed_frame:
    required_specs: [bed_size]
  mattress:
    required_specs: [bed_size]
  sheets:
    required_specs: [bed_size]
  comforter:
    required_specs: [bed_size]
  duvet_insert:
    required_specs: [bed_size]
  duvet_cover:
    required_specs: [bed_size]
  pillows:
    required_specs: []
  shams:
    required_specs: [bed_size]

  # Storage / workspace
  nightstand:
    required_specs: []
  dresser:
    required_specs: []
  desk:
    required_specs: []
  desk_chair:
    required_specs: []

  # Seating
  sofa:
    required_specs: []
  armchair:
    required_specs: []
  ottoman:
    required_specs: []

  # Entertainment
  tv:
    required_specs: [screen_size]
  tv_stand:
    required_specs: []
  sound_bar:
    required_specs: []

  # Tables
  coffee_table:
    required_specs: []
  side_table:
    required_specs: []

  # Lighting
  ceiling_light:
    required_specs: []
  table_lamp:
    required_specs: []
  floor_lamp:
    required_specs: []
  sconce:
    required_specs: []

  # Decor
  wall_art:
    required_specs: []
    max_quantity: 4
  plants:
    required_specs: []
    max_quantity: 3
  mirror:
    required_specs: []
  bookshelf:
    required_specs: []

  # Soft goods / wall treatments
  rug:
    required_specs: []
  curtains:
    required_specs: []
  throw_blanket:
    required_specs: []
  throw_pillows:
    required_specs: []
  # Budget weights are proportional to 75th-percentile product prices per
  # category. This ensures allocations scale evenly with budget — at $1500,
  # every slot reaches ~80% of p75; at $2000, every slot hits p75+.
room_presets:
  bedroom:
    groups:
      bed:
        budget_weight: 0.48
        items:
          bed_frame:    { required: true,  sub_weight: 0.26 }
          mattress:     { required: true,  sub_weight: 0.36 }
          sheets:       { required: true,  sub_weight: 0.07 }
          comforter:    { required: false, sub_weight: 0.07 }
          duvet_insert: { required: false, sub_weight: 0.10 }
          duvet_cover:  { required: false, sub_weight: 0.08 }
          pillows:      { required: true,  sub_weight: 0.06 }
      storage:
        budget_weight: 0.20
        items:
          nightstand:   { required: true,  sub_weight: 0.18 }
          dresser:      { required: false, sub_weight: 0.33 }
          desk:         { required: false, sub_weight: 0.29 }
          desk_chair:   { required: false, sub_weight: 0.20 }
      lighting:
        budget_weight: 0.08
        items:
          ceiling_light: { required: true,  sub_weight: 0.27 }
          table_lamp:    { required: false, sub_weight: 0.21 }
          floor_lamp:    { required: false, sub_weight: 0.26 }
          sconce:        { required: false, sub_weight: 0.26 }
      decor:
        budget_weight: 0.13
        items:
          wall_art:     { required: true,  sub_weight: 0.22 }
          plants:       { required: false, sub_weight: 0.27 }
          mirror:       { required: false, sub_weight: 0.51 }
      soft_goods:
        budget_weight: 0.11
        items:
          rug:             { required: true,  sub_weight: 0.59 }
          curtains:        { required: false, sub_weight: 0.23 }
          throw_blanket:   { required: false, sub_weight: 0.18 }

  living_room:
    groups:
      seating:
        budget_weight: 0.44
        items:
          sofa:         { required: true,  sub_weight: 0.60 }
          armchair:     { required: false, sub_weight: 0.27 }
          ottoman:      { required: false, sub_weight: 0.13 }
      tables:
        budget_weight: 0.24
        items:
          coffee_table: { required: true,  sub_weight: 0.36 }
          side_table:   { required: false, sub_weight: 0.19 }
          tv_stand:     { required: true,  sub_weight: 0.45 }
      lighting:
        budget_weight: 0.09
        items:
          ceiling_light: { required: true,  sub_weight: 0.37 }
          floor_lamp:    { required: false, sub_weight: 0.35 }
          table_lamp:    { required: false, sub_weight: 0.28 }
      decor:
        budget_weight: 0.12
        items:
          wall_art:     { required: true,  sub_weight: 0.22 }
          plants:       { required: false, sub_weight: 0.27 }
          mirror:       { required: false, sub_weight: 0.51 }
      soft_goods:
        budget_weight: 0.11
        items:
          rug:             { required: true,  sub_weight: 0.54 }
          curtains:        { required: false, sub_weight: 0.20 }
          throw_pillows:   { required: false, sub_weight: 0.10 }
          throw_blanket:   { required: false, sub_weight: 0.16 }

budget_rules:
  min_slot_dollars: 15.0
  max_slot_share: 0.40
