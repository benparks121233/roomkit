version: 2

# Flat item registry — ID + required specs only.
# Budget weights live in room_presets.groups, not here.
items:
  # Bed group
  bed_frame:
    required_specs: [bed_size]
  mattress:
    required_specs: [bed_size]
  sheets:
    required_specs: [bed_size]
  comforter:
    required_specs: [bed_size]
  pillows:
    required_specs: []
  shams:
    required_specs: [bed_size]

  # Storage
  nightstand:
    required_specs: []
  dresser:
    required_specs: []

  # Seating
  sofa:
    required_specs: []
  armchair:
    required_specs: []
  ottoman:
    required_specs: []

  # Entertainment
  tv:
    required_specs: [screen_size]
  tv_stand:
    required_specs: []
  sound_bar:
    required_specs: []

  # Tables
  coffee_table:
    required_specs: []
  side_table:
    required_specs: []

  # Lighting
  ceiling_light:
    required_specs: []
  table_lamp:
    required_specs: []
  floor_lamp:
    required_specs: []

  # Decor
  wall_art:
    required_specs: []
    max_quantity: 6
  plants:
    required_specs: []
    max_quantity: 3
  mirror:
    required_specs: []
  bookshelf:
    required_specs: []

  # Soft goods
  rug:
    required_specs: []
  curtains:
    required_specs: []
  throw_blanket:
    required_specs: []
    max_quantity: 2
  throw_pillows:
    required_specs: []

room_presets:
  bedroom:
    groups:
      bed:
        budget_weight: 0.36
        items:
          bed_frame:    { required: true,  sub_weight: 0.37 }
          mattress:     { required: true,  sub_weight: 0.34 }
          sheets:       { required: true,  sub_weight: 0.14 }
          comforter:    { required: true,  sub_weight: 0.08 }
          pillows:      { required: true,  sub_weight: 0.07 }
      storage:
        budget_weight: 0.15
        items:
          nightstand:   { required: true,  sub_weight: 0.50 }
          dresser:      { required: false, sub_weight: 0.50 }
      lighting:
        budget_weight: 0.12
        items:
          ceiling_light: { required: true,  sub_weight: 0.40 }
          table_lamp:    { required: false, sub_weight: 0.35 }
          floor_lamp:    { required: false, sub_weight: 0.25 }
      decor:
        budget_weight: 0.18
        items:
          wall_art:     { required: true,  sub_weight: 0.75 }
          plants:       { required: false, sub_weight: 0.15 }
          mirror:       { required: false, sub_weight: 0.10 }
      soft_goods:
        budget_weight: 0.19
        items:
          rug:             { required: true,  sub_weight: 0.40 }
          curtains:        { required: false, sub_weight: 0.32 }
          throw_blanket:   { required: false, sub_weight: 0.28 }

  living_room:
    groups:
      seating:
        budget_weight: 0.30
        items:
          sofa:         { required: true,  sub_weight: 0.55 }
          armchair:     { required: false, sub_weight: 0.30 }
          ottoman:      { required: false, sub_weight: 0.15 }
      entertainment:
        budget_weight: 0.22
        items:
          tv:           { required: true,  sub_weight: 0.55 }
          tv_stand:     { required: true,  sub_weight: 0.30 }
          sound_bar:    { required: false, sub_weight: 0.15 }
      tables:
        budget_weight: 0.10
        items:
          coffee_table: { required: true,  sub_weight: 0.60 }
          side_table:   { required: false, sub_weight: 0.40 }
      lighting:
        budget_weight: 0.10
        items:
          ceiling_light: { required: true,  sub_weight: 0.40 }
          floor_lamp:    { required: false, sub_weight: 0.35 }
          table_lamp:    { required: false, sub_weight: 0.25 }
      decor:
        budget_weight: 0.10
        items:
          wall_art:     { required: true,  sub_weight: 0.30 }
          plants:       { required: false, sub_weight: 0.25 }
          mirror:       { required: false, sub_weight: 0.20 }
          bookshelf:    { required: false, sub_weight: 0.25 }
      soft_goods:
        budget_weight: 0.18
        items:
          rug:             { required: true,  sub_weight: 0.40 }
          curtains:        { required: false, sub_weight: 0.25 }
          throw_pillows:   { required: false, sub_weight: 0.15 }
          throw_blanket:   { required: false, sub_weight: 0.20 }

budget_rules:
  min_slot_dollars: 15.0
  max_slot_share: 0.40
